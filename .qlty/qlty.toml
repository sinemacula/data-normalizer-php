# Reference: https://qlty.sh/d/qlty-toml
#
# Code-quality configuration for both the Qlty CLI and Qlty Cloud. Lint and
# format rules come from the shared sinemacula/coding-standards source; this
# file wires that source in and selects the plugins relevant to a PHP
# repository.
config_version = "0"

exclude_patterns = [
    "*_min.*",
    "*-min.*",
    "*.min.*",
    "**/build/**",
    "**/cache/**",
    "**/coverage/**",
    "**/dist/**",
    "**/node_modules/**",
    "**/vendor/**",
    ".qlty/configs/**",
    ".sinemacula/**",
]

test_patterns = [
    "**/test/**",
    "**/tests/**",
    "**/spec/**",
    "**/*.test.*",
    "**/*.spec.*",
    "**/*_test.*",
    "**/*_spec.*",
    "**/test_*.*",
    "**/spec_*.*",
]

# Runtime that executes the PHP linters (php-cs-fixer, phpstan, php-codesniffer).
# 8.4 is required because php-cs-fixer's bundled symfony/console now needs
# >=8.4.1; this is the tool runtime only and does not change the supported PHP
# range (the library still targets ^8.3 — see composer.json and the CI matrix).
[runtimes.enabled]
php = "8.4"

[smells]
mode = "comment"

[[source]]
name = "default"
default = true

[[source]]
name = "sinemacula"
repository = "https://github.com/sinemacula/coding-standards"
tag = "v1.1.3"

[[plugin]]
name = "actionlint"

[[plugin]]
name = "editorconfig-checker"

[[plugin]]
name = "markdownlint"
mode = "comment"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "php-codesniffer"
version = "4.0.1"
mode = "comment"
package_file = "composer.json"
package_filters = ["slevomat", "dealerdirect", "sinemacula"]

[[plugin]]
name = "php-cs-fixer"
package_file = "composer.json"
package_filters = ["sinemacula"]
version = "3.94.2"

[[plugin]]
name = "phpstan"
version = "2.1.46"

[[plugin]]
name = "radarlint-php"
mode = "comment"

[[plugin]]
name = "trivy"
drivers = [
    "config",
    "fs-vuln",
]

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "yamllint"

# phpstan needs the project's dependencies installed in its sandbox to resolve
# vendor symbols; without this, cloud runs report every third-party class as
# undefined. Do not remove.
[plugins.definitions.phpstan.drivers.lint]
prepare_script = "~/.qlty/cache/tools/composer/generic-42cc848a9f5e/composer.phar install --no-scripts --ignore-platform-reqs"

# Skip radarlint smell analysis on the test tree — reused fixture literals and
# multi-branch data providers trip duplication/return-count rules without value.
[[exclude]]
plugins = ["radarlint-php"]
file_patterns = ["tests/**"]
